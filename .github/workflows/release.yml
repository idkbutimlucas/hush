name: Release

# Build the macOS DMG and the Windows installer and attach both to a GitHub
# Release whenever you push a version tag (e.g. `git tag v0.1.0 && git push
# origin v0.1.0`). Neither artifact is signed/notarized (free & open-source) —
# users clear Gatekeeper / SmartScreen once on first launch.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build: npm run dist
            artifact: release/*.dmg
          - os: windows-latest
            build: npm run dist:win
            artifact: release/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # electron-builder stamps the app version from package.json, NOT the git
      # tag — so a tag pushed without a matching package.json bump ships a
      # mislabeled build (e.g. tag v0.1.6 producing a 0.1.2 app). Derive the
      # version from the tag here so the built artifact always matches the tag.
      - name: Stamp version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build installer (unsigned)
        run: ${{ matrix.build }}
        env:
          # Explicitly disable macOS signing/notarization — identity is null in
          # package.json; this makes electron-builder skip cleanly in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
          fail_on_unmatched_files: true
